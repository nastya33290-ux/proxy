<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="popup.css" />
  <title>Proxy Switcher Pro</title>
</head>
<body>
  <header class="hdr">
    <div class="title">
      <span class="dot" id="statusDot"></span>
      <span>Proxy Switcher</span>
    </div>
    <label class="switch" title="Включить/выключить прокси">
      <input type="checkbox" id="masterToggle" />
      <span class="slider"></span>
    </label>
  </header>

  <div class="search-wrap">
    <input type="text" id="search" placeholder="Поиск прокси..." />
  </div>

  <ul id="proxyList" class="list"></ul>

  <div id="empty" class="empty hidden">
    <p>Нет добавленных прокси.</p>
  </div>

  <footer class="ftr">
    <div class="active-info" id="activeInfo"></div>
    <div class="btn-row">
      <button id="openOptions" class="btn ghost">⚙ Настройки</button>
      <button id="randomProxy" class="btn ghost icon-btn" title="Включить случайный прокси">🎲</button>
      <button id="checkIp" class="btn ghost icon-btn" title="Проверить мой IP">🌍 IP</button>
    </div>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
